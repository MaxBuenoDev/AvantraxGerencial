<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVANTRAX | Login Seguro</title>
  <script src="/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg0: #061423;
      --bg1: #0e2235;
      --card: rgba(10, 23, 38, .88);
      --line: rgba(148, 163, 184, .25);
      --txt: #e2e8f0;
      --muted: #94a3b8;
      --acc: #00bfff;
      --danger: #ef4444;
      --ok: #10b981;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(0,191,255,.2), transparent 38%),
        radial-gradient(circle at 80% 15%, rgba(16,185,129,.15), transparent 34%),
        linear-gradient(135deg, var(--bg0), var(--bg1));
      color: var(--txt);
    }
    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: min(420px, calc(100vw - 24px));
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 24px 68px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 4px;
      font-size: 1.1rem;
      letter-spacing: .08em;
    }
    .sub {
      color: var(--muted);
      font-size: .88rem;
      margin-bottom: 16px;
    }
    .field {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      color: var(--muted);
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
    }
    input {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--txt);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
      font-size: .92rem;
    }
    input:focus {
      border-color: rgba(0,191,255,.65);
      box-shadow: 0 0 0 3px rgba(0,191,255,.18);
    }
    button {
      width: 100%;
      border: 1px solid rgba(0,191,255,.45);
      background: linear-gradient(135deg, rgba(0,123,255,.45), rgba(0,191,255,.28));
      color: #eaf7ff;
      border-radius: 10px;
      padding: 11px 12px;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: .05em;
    }
    button[disabled] {
      opacity: .65;
      cursor: wait;
    }
    .msg {
      margin-top: 10px;
      min-height: 18px;
      font-size: .82rem;
      color: var(--muted);
    }
    .msg.err { color: var(--danger); }
    .msg.ok { color: var(--ok); }
  </style>
</head>
<body>
  <div class="wrap">
    <form class="card" id="login-form">
      <h1>AVANTRAX</h1>
      <div class="sub">Acesso seguro por usuário e unidade</div>
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>
      <button id="submit-btn" type="submit">ENTRAR</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <script>
    (async function () {
      const qs = new URLSearchParams(window.location.search);
      const nextPath = String(qs.get("next") || "tv.html");

      const url = window.SUPABASE_URL;
      const key = window.SUPABASE_ANON_KEY;
      const createClient = window.supabase?.createClient;
      if (!url || !key || typeof createClient !== "function") {
        alert("Supabase nao configurado.");
        return;
      }

      const supabase = createClient(url, key);
      const form = document.getElementById("login-form");
      const emailEl = document.getElementById("email");
      const passEl = document.getElementById("password");
      const btn = document.getElementById("submit-btn");
      const msg = document.getElementById("msg");

      function setMsg(text, type) {
        msg.textContent = text || "";
        msg.className = "msg" + (type ? " " + type : "");
      }

      async function resolveAllowedUnit(userId) {
        const { data, error } = await supabase
          .from("user_units")
          .select("unit_slug, is_default")
          .eq("user_id", userId)
          .eq("active", true)
          .order("is_default", { ascending: false })
          .order("unit_slug", { ascending: true })
          .limit(1);
        if (error) throw error;
        return Array.isArray(data) && data.length ? String(data[0].unit_slug || "").trim() : "";
      }

      function withUnit(path, unitSlug) {
        const safe = String(unitSlug || "").trim().toLowerCase().replace(/[^a-z0-9_-]/g, "");
        const cleaned = String(path || "tv.html").trim() || "tv.html";
        const target = new URL(cleaned, window.location.origin + "/");
        if (safe) target.searchParams.set("unit", safe);
        return target;
      }

      function withSessionRelay(targetUrl, session) {
        try {
          const accessToken = String(session?.access_token || "").trim();
          const refreshToken = String(session?.refresh_token || "").trim();
          if (accessToken && refreshToken) {
            targetUrl.searchParams.set("at", accessToken);
            targetUrl.searchParams.set("rt", refreshToken);
          }
        } catch (_) {}
        return targetUrl;
      }

      try {
        const { data } = await supabase.auth.getUser();
        if (data?.user?.id) {
          const unit = await resolveAllowedUnit(data.user.id);
          if (unit) {
            const target = withUnit(nextPath, unit);
            window.location.replace(`${target.pathname.replace(/^\/+/, "")}${target.search || ""}`);
            return;
          }
        }
      } catch (_) {}

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        setMsg("", "");
        btn.disabled = true;
        btn.textContent = "VALIDANDO...";
        try {
          const email = String(emailEl.value || "").trim();
          const password = String(passEl.value || "");
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          const userId = data?.user?.id || "";
          if (!userId) throw new Error("Usuario invalido.");

          const unit = await resolveAllowedUnit(userId);
          if (!unit) {
            await supabase.auth.signOut();
            throw new Error("Usuario sem acesso a nenhuma unidade ativa.");
          }

          setMsg("Acesso liberado. Redirecionando...", "ok");
          const target = withSessionRelay(withUnit(nextPath, unit), data?.session);
          window.location.replace(`${target.pathname.replace(/^\/+/, "")}${target.search || ""}`);
        } catch (err) {
          setMsg(err?.message || "Falha ao autenticar.", "err");
          btn.disabled = false;
          btn.textContent = "ENTRAR";
        }
      });
    })();
  </script>
</body>
</html>
