<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVANTRAX | TV</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      iframe {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        visibility: hidden;
      }
      iframe.active {
        visibility: visible;
      }
    </style>
  </head>
  <body>
    <iframe id="frame-index" src="index.html?tv=1"></iframe>
    <iframe id="frame-mapa" src="mapa.html?tv=1"></iframe>

    <script>
      const DURATION_MS = 120000;

      const frames = {
        index: document.getElementById("frame-index"),
        mapa: document.getElementById("frame-mapa"),
      };

      const ready = { index: false, mapa: false };
      let current = "index";

      function setActive(name) {
        Object.entries(frames).forEach(([k, el]) => {
          if (!el) return;
          el.classList.toggle("active", k === name);
        });
        current = name;
      }

      function postRefresh(name) {
        try {
          frames[name]?.contentWindow?.postMessage({ type: "avantrax:refresh" }, "*");
        } catch (_) {}
      }

      function getNext() {
        return current === "index" ? "mapa" : "index";
      }

      function trySwitch() {
        const next = getNext();
        if (!ready[next]) return;
        setActive(next);
        postRefresh(next);
      }

      window.addEventListener("message", (e) => {
        const data = e && e.data;
        if (!data || typeof data !== "object") return;
        if (data.type === "avantrax:ready" && (data.page === "index" || data.page === "mapa")) {
          ready[data.page] = true;
        }
        if (data.type === "avantrax:data_updated") {
          postRefresh("mapa");
        }
      });

      Object.keys(frames).forEach((name) => {
        frames[name].addEventListener("load", () => postRefresh(name));
      });

      setActive("index");
      postRefresh("index");

      setInterval(() => {
        trySwitch();
      }, DURATION_MS);
    </script>
  </body>
</html>
